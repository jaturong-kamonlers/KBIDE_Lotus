name: Release Overlay Pack

# Builds a "drop-in overlay" archive of KBIDE_Lotus boards/plugins/docs.
# Users extract this on top of an existing KBIDE installation.
#
# Trigger: push a tag like v1.0.0 (or run manually from Actions tab).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write  # needed to create releases

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build overlay payload
        run: |
          mkdir -p out/KBIDE_Lotus_overlay
          cp -r boards plugins out/KBIDE_Lotus_overlay/
          cp README.md NOTICE.md CHANGELOG.md out/KBIDE_Lotus_overlay/
          # Strip build caches just in case
          find out/KBIDE_Lotus_overlay -type d -name build -prune -exec rm -rf {} + || true
          find out/KBIDE_Lotus_overlay -type f \( -name '*.bak*' -o -name '*.tmp' \) -delete

      - name: Create zip (Windows users)
        working-directory: out
        run: zip -rq "KBIDE_Lotus_overlay_${{ steps.ver.outputs.tag }}.zip" KBIDE_Lotus_overlay

      - name: Create tar.gz (Linux / Jetson users)
        working-directory: out
        run: tar -czf "KBIDE_Lotus_overlay_${{ steps.ver.outputs.tag }}.tar.gz" KBIDE_Lotus_overlay

      - name: SHA256 checksums
        working-directory: out
        run: sha256sum *.zip *.tar.gz > "SHA256SUMS_${{ steps.ver.outputs.tag }}.txt"

      - name: Upload artifacts (for workflow_dispatch runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: KBIDE_Lotus_overlay_${{ steps.ver.outputs.tag }}
          path: out/*

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.ver.outputs.tag }}
          body: |
            **KBIDE_Lotus overlay pack** — extract on top of your existing KBIDE installation.

            See `CHANGELOG.md` for changes in this release.

            > Not affiliated with Maker Asia or Lotus Arduibot.
            > Provided AS IS under MIT License.
          files: |
            out/*.zip
            out/*.tar.gz
            out/SHA256SUMS_*.txt
